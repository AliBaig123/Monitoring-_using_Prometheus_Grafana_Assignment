spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/backenddb
    username: alibaig
    password: devops
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
server:
  port: 9090
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    metrics:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true